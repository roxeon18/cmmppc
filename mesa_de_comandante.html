<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesa de Comandante</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            felt: '#1b241f',
            feltLight: '#212c25',
            parchment: '#efe7d4',
            parchmentDim: '#e2d8bf',
            ink: '#2a2420',
            inkSoft: '#5c5347',
            gold: '#bb9550',
            goldBright: '#d9b876',
            crimson: '#9a4235',
          },
          fontFamily: {
            serif: ['Fraunces', 'serif'],
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      background: radial-gradient(ellipse at top, #212c25 0%, #1b241f 70%);
      color: #efe7d4;
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1b241f;
    }
    ::-webkit-scrollbar-thumb {
      background: #bb9550;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #d9b876;
    }
  </style>
</head>
<body class="font-sans min-h-screen pb-16">

  <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"></div>

  <script>
    const STORAGE_KEY = "commander-data";
    
    // Beautiful fantasy default avatars for commanders
    const PRESET_AVATARS = [
      { name: "Fuego (Chandra)", url: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=600&auto=format&fit=crop&q=80" },
      { name: "Bosque (Garruk)", url: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=600&auto=format&fit=crop&q=80" },
      { name: "Muerte (Liliana)", url: "https://images.unsplash.com/photo-1514064019862-23e2a332a6a6?w=600&auto=format&fit=crop&q=80" },
      { name: "Agua (Jace)", url: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=600&auto=format&fit=crop&q=80" },
      { name: "Luz (Gideon)", url: "https://images.unsplash.com/photo-1559893088-c0787ebfc084?w=600&auto=format&fit=crop&q=80" },
      { name: "Dragón (Nicol Bolas)", url: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=600&auto=format&fit=crop&q=80" },
      { name: "Ciudadela Antigua", url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop&q=80" },
      { name: "Eclipse Astral", url: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=600&auto=format&fit=crop&q=80" }
    ];

    function uid() {
      if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
      return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    function emptyData() { 
      return { 
        players: [], 
        decks: [], 
        games: [],
        bannerUrl: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&auto=format&fit=crop&q=80"
      }; 
    }

    function todayISO() { 
      return new Date().toISOString().slice(0, 10); 
    }

    function fmtDate(iso) {
      try {
        const d = new Date(iso + "T00:00:00");
        return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" });
      } catch { return iso; }
    }

    function esc(str) {
      return String(str == null ? "" : str).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    let appState = { 
      data: null, 
      loading: true, 
      tab: "registrar", 
      saveError: null,
      editingPlayerId: null
    };

    const mockStorage = {
      get: async (key, bypass) => {
        if (window.storage && window.storage.get) return window.storage.get(key, bypass);
        return { value: localStorage.getItem(key) };
      },
      set: async (key, val, bypass) => {
        if (window.storage && window.storage.set) return window.storage.set(key, val, bypass);
        localStorage.setItem(key, val);
        return true;
      }
    };

    async function loadData() {
      try {
        const res = await mockStorage.get(STORAGE_KEY, true);
        appState.data = res && res.value ? JSON.parse(res.value) : emptyData();
        
        if (appState.data && appState.data.players) {
          appState.data.players.forEach(p => {
            if (!p.avatarUrl) {
              p.avatarUrl = PRESET_AVATARS[Math.floor(Math.random() * PRESET_AVATARS.length)].url;
            }
          });
        } else {
          appState.data.players = [];
        }
        
        if (!appState.data.decks) appState.data.decks = [];
        if (!appState.data.games) appState.data.games = [];
        
        if (!appState.data.bannerUrl) {
          appState.data.bannerUrl = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&auto=format&fit=crop&q=80";
        }
      } catch (e) {
        appState.data = emptyData();
      }
      appState.loading = false;
      render();
    }

    async function persistData(next) {
      appState.data = next;
      try {
        const res = await mockStorage.set(STORAGE_KEY, JSON.stringify(next), true);
        appState.saveError = res ? null : "No se pudo guardar el cambio. Revisa tu conexión.";
      } catch (e) {
        appState.saveError = "No se pudo guardar el cambio en el servidor.";
      }
      render();
    }

    function addPlayer(name, avatarUrl) {
      const d = appState.data;
      const finalAvatar = avatarUrl || PRESET_AVATARS[Math.floor(Math.random() * PRESET_AVATARS.length)].url;
      persistData({ 
        ...d, 
        players: [...d.players, { id: uid(), name, avatarUrl: finalAvatar, createdAt: Date.now() }] 
      });
    }

    function updatePlayer(id, name, avatarUrl) {
      const d = appState.data;
      const updatedPlayers = d.players.map(p => {
        if (p.id === id) {
          return { ...p, name, avatarUrl };
        }
        return p;
      });
      persistData({ ...d, players: updatedPlayers });
    }

    function deletePlayer(id) {
      const d = appState.data;
      const used = d.games.some((g) => g.participants.some((pt) => pt.playerId === id));
      if (used) return false;
      persistData({
        ...d,
        players: d.players.filter((p) => p.id !== id),
        decks: d.decks.filter((dk) => dk.playerId !== id),
      });
      return true;
    }

    function updateBanner(url) {
      const d = appState.data;
      persistData({ ...d, bannerUrl: url });
    }

    function addDeck(playerId, name, commander, deckUrl, imageUrl = "") {
      const d = appState.data;
      persistData({ 
        ...d, 
        decks: [...d.decks, { id: uid(), playerId, name, commander, deckUrl, imageUrl, createdAt: Date.now() }] 
      });
    }

    function deleteDeck(id) {
      const d = appState.data;
      const used = d.games.some((g) => g.participants.some((pt) => pt.deckId === id));
      if (used) return false;
      persistData({ ...d, decks: d.decks.filter((dk) => dk.id !== id) });
      return true;
    }

    function addGame(date, participants, winnerId, notes) {
      const d = appState.data;
      persistData({ ...d, games: [{ id: uid(), date, participants, winnerId, notes, createdAt: Date.now() }, ...d.games] });
    }

    function deleteGame(id) {
      const d = appState.data;
      persistData({ ...d, games: d.games.filter((g) => g.id !== id) });
    }

    function computePlayerStats() {
      const { players, games } = appState.data;
      return players.map((p) => {
        const pg = games.filter((g) => g.participants.some((pt) => pt.playerId === p.id));
        const wins = pg.filter((g) => g.winnerId === p.id).length;
        const gamesPlayed = pg.length;
        return { ...p, gamesPlayed, wins, winrate: gamesPlayed ? (wins / gamesPlayed) * 100 : 0 };
      });
    }

    function computeDeckStats() {
      const { decks, games } = appState.data;
      const map = {};
      decks.forEach((d) => {
        const dg = games.filter((g) => g.participants.some((pt) => pt.deckId === d.id));
        const wins = dg.filter((g) => g.winnerId === d.playerId).length;
        const gamesPlayed = dg.length;
        map[d.id] = { gamesPlayed, wins, winrate: gamesPlayed ? (wins / gamesPlayed) * 100 : 0 };
      });
      return map;
    }

    function getDecksRanking() {
      const { decks, players } = appState.data;
      const statsMap = computeDeckStats();
      return decks.map(d => {
        const owner = players.find(p => p.id === d.playerId);
        const stats = statsMap[d.id] || { gamesPlayed: 0, wins: 0, winrate: 0 };
        return {
          ...d,
          ownerName: owner ? owner.name : "Desconocido",
          gamesPlayed: stats.gamesPlayed,
          wins: stats.wins,
          winrate: stats.winrate
        };
      }).sort((a, b) => b.winrate - a.winrate || b.wins - a.wins || b.gamesPlayed - a.gamesPlayed || a.name.localeCompare(b.name));
    }

    async function fetchCommanderFromUrl(decklistUrl) {
      const systemPrompt = "Actúas como un experto archivista de Magic: The Gathering. Tu tarea consiste en identificar y aislar el nombre oficial en inglés del Comandante principal del mazo. Analiza la URL del decklist (Moxfield, Archidekt, MTGGoldfish, etc.) provista y devuélvenos estrictamente un JSON estructurado con el formato: { \"commander\": \"Exact Name of Card\" }. Si no lo encuentras, deja el campo de texto vacío.";
      const userQuery = `¿Cuál es el comandante principal de este enlace de mazo?: ${decklistUrl}`;
      const apiKey = ""; // Canvas injects this automatically
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{ parts: [{ text: userQuery }] }],
        tools: [{ "google_search": {} }],
        systemInstruction: {
          parts: [{ text: systemPrompt }]
        },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              commander: { type: "STRING" }
            },
            required: ["commander"]
          }
        }
      };

      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) throw new Error("Error en el escáner del mazo");
      const result = await response.json();
      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
      if (text) {
        const parsed = JSON.parse(text);
        return parsed.commander;
      }
      return "";
    }

    async function fetchScryfallData(commanderName) {
      try {
        const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(commanderName)}`);
        if (res.ok) {
          const card = await res.json();
          const artCrop = card.image_uris?.art_crop || card.card_faces?.[0]?.image_uris?.art_crop || "";
          return {
            name: card.name,
            artCrop: artCrop
          };
        }
      } catch (e) {
        console.error("Error al buscar arte en Scryfall", e);
      }
      return null;
    }

    function getPlayerBackground(player) {
      if (player.avatarUrl && !player.avatarUrl.includes("unsplash.com") && !player.avatarUrl.includes("placehold.co")) {
        return player.avatarUrl;
      }
      const { decks } = appState.data;
      const playerDecks = decks.filter(d => d.playerId === player.id);
      const deckWithArt = playerDecks.find(d => d.imageUrl);
      if (deckWithArt) {
        return deckWithArt.imageUrl;
      }
      return player.avatarUrl || PRESET_AVATARS[0].url;
    }

    function openBannerModal() {
      const currentBanner = appState.data.bannerUrl || "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&auto=format&fit=crop&q=80";
      
      const PRESET_BANNERS = [
        { name: "Santuario Astral", url: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&auto=format&fit=crop&q=80" },
        { name: "Mesa de Juego", url: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=1600&auto=format&fit=crop&q=80" },
        { name: "Biblioteca Antigua", url: "https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1600&auto=format&fit=crop&q=80" },
        { name: "Montaña Legendaria", url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600&auto=format&fit=crop&q=80" },
        { name: "Bosque de Niebla", url: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=1600&auto=format&fit=crop&q=80" }
      ];

      const modalWrapper = document.createElement("div");
      modalWrapper.id = "banner-modal-container";
      modalWrapper.className = "fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4";
      modalWrapper.innerHTML = `
        <div class="bg-felt border border-gold/40 rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
          <h3 class="font-serif text-2xl font-bold text-goldBright mb-4">Editar Portada del Grupo</h3>
          
          <form id="edit-banner-form" class="space-y-4">
            <div id="banner-error"></div>
            
            <div>
              <label class="block text-xs font-semibold uppercase tracking-wider text-parchmentDim/70 mb-1">Enlace de Imagen Personalizada</label>
              <input type="url" id="custom-banner-url" placeholder="https://ejemplo.com/paisaje-epico.jpg" value="${esc(currentBanner)}" class="w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-xs focus:border-gold focus:outline-none mb-2">
              <span class="block text-[10px] text-parchmentDim/50 mb-3">Pega la URL de cualquier ilustración de internet, o selecciona un ambiente a continuación:</span>
              
              <div class="grid grid-cols-2 gap-2 bg-black/30 p-2.5 rounded-lg border border-white/5">
                ${PRESET_BANNERS.map((b) => `
                  <button type="button" class="preset-banner-btn relative rounded overflow-hidden aspect-[16/9] border border-white/10 hover:border-gold transition-all" data-url="${b.url}">
                    <img src="${b.url}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 inset-x-0 bg-black/75 text-[10px] text-center py-1 text-parchment truncate">${b.name}</div>
                  </button>
                `).join("")}
              </div>
            </div>

            <div class="flex gap-2 pt-3">
              <button type="submit" class="flex-1 py-2.5 rounded-lg bg-gold text-ink font-bold text-sm hover:bg-goldBright transition-all cursor-pointer">
                Guardar Portada
              </button>
              <button type="button" class="px-5 py-2.5 rounded-lg bg-white/5 border border-white/10 text-parchment text-sm hover:bg-white/10 transition-all cursor-pointer" id="cancel-banner-form">
                Cancelar
              </button>
            </div>
          </form>
        </div>
      `;
      document.body.appendChild(modalWrapper);

      modalWrapper.querySelectorAll(".preset-banner-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          modalWrapper.querySelector("#custom-banner-url").value = btn.getAttribute("data-url");
          modalWrapper.querySelectorAll(".preset-banner-btn").forEach(b => b.classList.remove("border-gold"));
          btn.classList.add("border-gold");
        });
      });

      modalWrapper.querySelector("#edit-banner-form").addEventListener("submit", (ev) => {
        ev.preventDefault();
        const url = modalWrapper.querySelector("#custom-banner-url").value.trim();
        const errBox = modalWrapper.querySelector("#banner-error");
        if (!url) {
          errBox.innerHTML = `<div class="bg-crimson/10 border border-crimson text-parchment text-xs p-3 rounded-lg mb-3">Introduce una URL de imagen válida.</div>`;
          return;
        }
        updateBanner(url);
        modalWrapper.remove();
      });

      modalWrapper.querySelector("#cancel-banner-form").addEventListener("click", () => {
        modalWrapper.remove();
      });
    }

    function renderPlayerProfileCard(player, rankSymbol = null, extraClasses = "") {
      const coverPhoto = getPlayerBackground(player);
      const displayRank = rankSymbol ? `
        <div class="absolute top-3 left-3 bg-gold text-ink font-serif font-bold text-sm w-8 h-8 rounded-full flex items-center justify-center shadow-lg border border-goldBright/40 z-10">
          ${rankSymbol}
        </div>` : "";

      return `
        <div class="relative rounded-2xl overflow-hidden border border-gold/20 shadow-2xl h-[310px] flex flex-col justify-between group transition-all duration-300 hover:scale-[1.02] hover:border-gold/50 hover:shadow-gold/10 ${extraClasses}">
          <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" 
               style="background-image: url('${coverPhoto}');">
          </div>
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/55 to-black/10"></div>
          
          <div class="relative p-4 flex justify-between items-start z-10 w-full">
            ${displayRank}
          </div>

          <div class="relative p-4 z-10 bg-gradient-to-t from-black via-black/80 to-transparent pt-8">
            <div class="flex justify-between items-end gap-2">
              <div>
                <h3 class="font-serif text-xl font-bold text-parchment drop-shadow-md tracking-wide line-clamp-1">${esc(player.name)}</h3>
              </div>
              <div class="font-mono text-xs text-goldBright font-bold bg-black/60 px-2 py-1 rounded border border-gold/20 shrink-0">
                Winrate: ${Math.round(player.winrate)}%
              </div>
            </div>

            <div class="grid grid-cols-2 gap-2 border-t border-white/10 mt-3 pt-3">
              <div class="text-center bg-black/30 p-1.5 rounded border border-white/5">
                <span class="block text-[10px] text-parchmentDim/60 uppercase tracking-wider">Partidas</span>
                <span class="font-mono text-sm font-bold text-parchment">${player.gamesPlayed}</span>
              </div>
              <div class="text-center bg-black/30 p-1.5 rounded border border-white/5">
                <span class="block text-[10px] text-parchmentDim/60 uppercase tracking-wider">Victorias</span>
                <span class="font-mono text-sm font-bold text-goldBright">${player.wins}</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    function renderMiniPlayerCard(player, isWinner, deck) {
      const deckName = deck ? deck.name : "Sin Mazo";
      const cmdName = deck ? deck.commander : "Sin Comandante";
      const deckUrl = deck ? deck.deckUrl : "";
      const cardBg = (deck && deck.imageUrl) ? deck.imageUrl : getPlayerBackground(player);
      const winBorder = isWinner ? "border-goldBright shadow-[0_0_15px_rgba(217,184,118,0.25)] animate-pulse" : "border-white/10";
      
      return `
        <div class="relative rounded-xl overflow-hidden border ${winBorder} h-44 flex flex-col justify-end p-3 shadow-lg group transition-transform duration-300 hover:scale-[1.03]">
          <div class="absolute inset-0 bg-cover bg-center transition-transform duration-500 group-hover:scale-105" 
               style="background-image: url('${cardBg}');">
          </div>
          <div class="absolute inset-0 bg-gradient-to-t from-black via-black/80 to-transparent"></div>
          
          ${isWinner ? `
            <div class="absolute top-2 right-2 bg-gradient-to-r from-gold to-goldBright text-black text-[10px] font-bold px-2 py-0.5 rounded shadow-lg tracking-wider uppercase flex items-center gap-1 z-10">
              GANADOR
            </div>` : ""}

          <div class="relative z-10">
            <div class="flex items-center justify-between gap-1 mb-1">
              <span class="font-serif font-bold text-base text-parchment line-clamp-1 leading-tight">${esc(player.name)}</span>
            </div>
            
            <div class="text-[11px] text-goldBright leading-tight font-semibold line-clamp-1" title="${esc(deckName)}">
              Mazo: ${esc(deckName)}
            </div>
            <div class="text-[10px] text-parchmentDim/70 italic line-clamp-1" title="${esc(cmdName)}">
              Comandante: ${esc(cmdName)}
            </div>
            ${deckUrl ? `
              <a href="${esc(deckUrl)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-[9px] text-goldBright bg-black/50 px-1.5 py-0.5 rounded border border-gold/20 hover:bg-gold hover:text-ink mt-1.5 transition-colors">
                Ver Lista
              </a>` : ""}
          </div>
        </div>`;
    }

    function render() {
      const app = document.getElementById("app");
      if (appState.loading) {
        app.innerHTML = `
          <div class="flex flex-col items-center justify-center min-h-[60vh] text-parchmentDim">
            <svg class="animate-spin h-10 w-10 text-gold mb-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="font-mono text-sm uppercase tracking-widest">Barajando la mesa de juego...</p>
          </div>`;
        return;
      }

      const { players, decks, games, bannerUrl } = appState.data;
      const currentBanner = bannerUrl || "https://images.unsplash.com/photo-1518005020951-eccb494ad742?w=1600&auto=format&fit=crop&q=80";
      
      app.innerHTML = `
        <div class="relative py-12 text-center border-b border-gold/20 rounded-b-3xl overflow-hidden shadow-2xl">
          <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700" 
               style="background-image: url('${currentBanner}');">
          </div>
          <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-felt/80 to-felt"></div>

          <button id="edit-banner-btn" class="absolute top-4 right-4 z-30 bg-black/75 hover:bg-gold hover:text-ink text-goldBright text-xs font-semibold px-3 py-2 rounded-xl border border-gold/30 transition-all flex items-center gap-1.5 shadow-xl cursor-pointer">
            Cambiar Portada
          </button>

          <div class="relative z-10 max-w-7xl mx-auto px-4">
            <h1 class="font-serif text-4xl sm:text-6xl font-extrabold tracking-wide text-goldBright drop-shadow-lg mt-4">
              Pinches Perros
            </h1>
            <p class="mt-2 text-sm sm:text-base text-parchmentDim/80 max-w-xl mx-auto font-sans drop-shadow-md">
              Mesa de Comandante: Registro de partidas, ranking y mazos del grupo. <br>
              <span class="text-crimson font-semibold text-xs tracking-wider uppercase font-mono bg-crimson/20 px-2.5 py-1 rounded-full inline-block mt-2 border border-crimson/30">
                Focus a Xesc, da igual, focus a Xesc
              </span>
            </p>

            <div class="flex justify-center gap-6 sm:gap-10 mt-8 flex-wrap">
              <div class="text-center px-4 py-2 bg-black/50 rounded-xl border border-white/10 min-w-[100px] backdrop-blur-sm">
                <span class="font-mono text-3xl font-extrabold text-goldBright block">${games.length}</span>
                <span class="text-[10px] uppercase tracking-widest text-parchmentDim/60 font-semibold">Partidas</span>
              </div>
              <div class="text-center px-4 py-2 bg-black/50 rounded-xl border border-white/10 min-w-[100px] backdrop-blur-sm">
                <span class="font-mono text-3xl font-extrabold text-goldBright block">${players.length}</span>
                <span class="text-[10px] uppercase tracking-widest text-parchmentDim/60 font-semibold">Jugadores</span>
              </div>
              <div class="text-center px-4 py-2 bg-black/50 rounded-xl border border-white/10 min-w-[100px] backdrop-blur-sm">
                <span class="font-mono text-3xl font-extrabold text-goldBright block">${decks.length}</span>
                <span class="text-[10px] uppercase tracking-widest text-parchmentDim/60 font-semibold">Mazos</span>
              </div>
            </div>
          </div>
        </div>

        <div class="flex justify-center gap-2 sm:gap-4 mt-8 flex-wrap">
          <button class="cmdr-tab px-5 py-2.5 rounded-full text-xs sm:text-sm font-semibold tracking-wider border transition-all duration-200 cursor-pointer ${appState.tab === "registrar" ? "bg-gold text-ink border-gold font-bold shadow-lg shadow-gold/10" : "bg-transparent text-parchmentDim/80 border-gold/30 hover:border-gold hover:text-parchment"}" data-tab="registrar">
            REGISTRAR PARTIDA
          </button>
          <button class="cmdr-tab px-5 py-2.5 rounded-full text-xs sm:text-sm font-semibold tracking-wider border transition-all duration-200 cursor-pointer ${appState.tab === "ranking" ? "bg-gold text-ink border-gold font-bold shadow-lg shadow-gold/10" : "bg-transparent text-parchmentDim/80 border-gold/30 hover:border-gold hover:text-parchment"}" data-tab="ranking">
            RANKING GRUPAL
          </button>
          <button class="cmdr-tab px-5 py-2.5 rounded-full text-xs sm:text-sm font-semibold tracking-wider border transition-all duration-200 cursor-pointer ${appState.tab === "jugadores" ? "bg-gold text-ink border-gold font-bold shadow-lg shadow-gold/10" : "bg-transparent text-parchmentDim/80 border-gold/30 hover:border-gold hover:text-parchment"}" data-tab="jugadores">
            PERFILES Y MAZOS
          </button>
        </div>

        ${appState.saveError ? `
          <div class="mt-6 max-w-4xl mx-auto bg-crimson/10 border border-crimson text-parchment p-4 rounded-xl text-sm flex items-center justify-between">
            <span>Error: ${esc(appState.saveError)}</span>
            <button onclick="this.parentElement.remove()" class="text-parchmentDim hover:text-white">✕</button>
          </div>` : ""}

        <div class="mt-8 max-w-6xl mx-auto">
          <div id="tab-content" class="space-y-8"></div>
        </div>`;

      attachGlobalListeners();
      
      const tc = document.getElementById("tab-content");
      if (appState.tab === "registrar") { 
        tc.innerHTML = registrarTabHTML(); 
        initRegistrarTab(); 
      } else if (appState.tab === "ranking") { 
        tc.innerHTML = rankingTabHTML(); 
      } else { 
        tc.innerHTML = jugadoresTabHTML(); 
        initJugadoresTab(); 
      }
    }

    function attachGlobalListeners() {
      document.querySelectorAll("[data-tab]").forEach((btn) => {
        btn.addEventListener("click", () => { 
          appState.tab = btn.getAttribute("data-tab"); 
          render(); 
        });
      });

      const editBannerBtn = document.getElementById("edit-banner-btn");
      if (editBannerBtn) {
        editBannerBtn.addEventListener("click", (e) => {
          e.preventDefault();
          openBannerModal();
        });
      }
    }

    function slotHTML(index, players) {
      const options = players.map((p) => `<option value="${p.id}">${esc(p.name)}</option>`).join("");
      return `
        <div class="cmdr-slot bg-black/25 border border-white/5 rounded-xl p-4 transition-all duration-200 relative hover:border-gold/30" data-slot>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-end">
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-parchmentDim/70 font-semibold mb-1.5">Jugador ${index}</label>
              <select class="slot-player-select w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-sm focus:border-gold focus:outline-none">
                <option value="">Selecciona un jugador...</option>
                ${options}
              </select>
            </div>
            
            <div>
              <label class="block text-[10px] uppercase tracking-wider text-parchmentDim/70 font-semibold mb-1.5">Mazo</label>
              <select class="slot-deck-select w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-sm focus:border-gold focus:outline-none" disabled>
                <option value="">Elige un jugador primero</option>
              </select>
            </div>
          </div>

          <div class="flex items-center justify-between mt-3 pt-3 border-t border-white/5">
            <label class="inline-flex items-center gap-2 cursor-pointer text-xs text-parchmentDim/90 hover:text-parchment">
              <input type="radio" name="winner" class="slot-winner-radio w-4 h-4 rounded-full border border-goldBright/50 text-gold bg-felt focus:ring-0 focus:ring-offset-0 cursor-pointer">
              <span class="font-medium">Marcar como Ganador</span>
            </label>
            <button type="button" class="cmdr-slot-remove text-xs text-crimson bg-crimson/10 px-2 py-1 rounded hover:bg-crimson hover:text-white transition-colors cursor-pointer" data-action="remove-slot" title="Quitar">
              Eliminar
            </button>
          </div>
        </div>`;
    }

    function registrarTabHTML() {
      const { players, games, decks } = appState.data;
      if (players.length === 0) {
        return `
          <div class="bg-black/30 border border-gold/20 p-8 rounded-2xl shadow-xl text-center">
            <h2 class="font-serif text-2xl font-bold text-goldBright mb-2">Registrar partida</h2>
            <div class="text-parchmentDim max-w-md mx-auto text-sm my-6">Crea algunos perfiles de jugador y dales un mazo en la pestaña <b>Perfiles y Mazos</b> para poder disputar una partida.</div>
          </div>`;
      }

      const initialSlots = [1, 2, 3, 4].map((i) => slotHTML(i, players)).join("");

      const logHTML = games.length === 0
        ? `<div class="text-center py-12 text-parchmentDim/50 font-mono text-sm">No hay registros de contiendas guardados.</div>`
        : games.map((g) => {
            return `
              <div class="bg-black/25 border border-white/5 rounded-2xl p-4 sm:p-6 shadow-md hover:border-gold/20 transition-all duration-300" data-game-id="${g.id}">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-white/5 pb-4 mb-4">
                  <div>
                    <span class="text-xs font-mono bg-black/40 text-goldBright px-3 py-1 rounded-full border border-gold/10">${fmtDate(g.date)}</span>
                  </div>
                  <span class="game-delete-zone shrink-0">
                    <button class="text-xs text-crimson bg-crimson/5 hover:bg-crimson hover:text-white border border-crimson/30 rounded px-2.5 py-1 transition-colors cursor-pointer" data-action="delete-game-ask" title="Eliminar partida">
                      Borrar Registro
                    </button>
                  </span>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                  ${g.participants.map((pt) => {
                    const pl = players.find(x => x.id === pt.playerId);
                    const dk = decks.find(x => x.id === pt.deckId);
                    if (!pl) return `<div class="bg-black/40 rounded p-4 text-xs italic text-white/40">Jugador ausente</div>`;
                    const isWin = pt.playerId === g.winnerId;
                    return renderMiniPlayerCard(pl, isWin, dk);
                  }).join("")}
                </div>

                ${g.notes ? `
                  <div class="mt-4 bg-black/15 border-l-2 border-gold/50 p-3 rounded-r-lg text-sm text-parchmentDim/90 italic">
                    "${esc(g.notes)}"
                  </div>` : ""}
              </div>`;
          }).join("");

      return `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <div class="lg:col-span-1 bg-black/20 border border-gold/10 p-6 rounded-2xl shadow-xl h-fit">
            <h2 class="font-serif text-2xl font-bold text-goldBright mb-4 flex items-center gap-2">
              <span>Nueva Batalla</span>
            </h2>
            <div id="reg-error"></div>
            
            <form id="registrar-form" class="space-y-4">
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-parchmentDim/70 mb-1">Fecha</label>
                <input type="date" id="reg-date" value="${todayISO()}" class="w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-sm focus:border-gold focus:outline-none">
              </div>

              <div id="slots-container" class="space-y-4 max-h-[350px] overflow-y-auto pr-1">
                ${initialSlots}
              </div>

              <button type="button" class="w-full text-center py-2 text-xs font-semibold rounded-lg bg-white/5 border border-white/10 text-parchment hover:bg-white/10 hover:border-gold/40 transition-colors cursor-pointer" id="add-slot-btn">
                + Añadir Puesto
              </button>

              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-parchmentDim/70 mb-1">Relato / Notas (Opcional)</label>
                <textarea id="reg-notes" placeholder="¿Cómo fue la victoria? ¿Hubo combo infinito?" class="w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-sm h-20 focus:border-gold focus:outline-none resize-none"></textarea>
              </div>

              <button type="submit" class="w-full py-3 rounded-xl bg-gold hover:bg-goldBright text-ink font-bold tracking-wider text-sm transition-all shadow-lg shadow-gold/15 cursor-pointer">
                REGISTRAR COMBATE
              </button>
            </form>
          </div>

          <div class="lg:col-span-2 space-y-6">
            <h2 class="font-serif text-2xl font-bold text-goldBright flex items-center gap-2">
              <span>Crónicas Recientes</span>
            </h2>
            <div id="game-log" class="space-y-6">
              ${logHTML}
            </div>
          </div>
        </div>`;
    }

    function initRegistrarTab() {
      const container = document.getElementById("slots-container");
      if (!container) return;
      refreshSlotControls();

      container.addEventListener("change", (e) => {
        if (e.target.classList.contains("slot-player-select")) {
          const slotEl = e.target.closest("[data-slot]");
          rebuildDeckSelect(slotEl, e.target.value);
        }
        if (e.target.classList.contains("slot-winner-radio")) {
          document.querySelectorAll("#slots-container [data-slot]").forEach((s) => {
            s.classList.remove("border-goldBright", "bg-gold/5");
          });
          e.target.closest("[data-slot]").classList.add("border-goldBright", "bg-gold/5");
        }
      });

      container.addEventListener("click", (e) => {
        const btn = e.target.closest('[data-action="remove-slot"]');
        if (btn) {
          const slots = document.querySelectorAll("#slots-container [data-slot]");
          if (slots.length > 2) btn.closest("[data-slot]").remove();
          refreshSlotControls();
        }
      });

      document.getElementById("add-slot-btn").addEventListener("click", () => {
        const slots = document.querySelectorAll("#slots-container [data-slot]");
        if (slots.length >= 6) return;
        const wrapper = document.createElement("div");
        wrapper.innerHTML = slotHTML(slots.length + 1, appState.data.players);
        container.appendChild(wrapper.firstElementChild);
        refreshSlotControls();
      });

      document.getElementById("registrar-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const errorBox = document.getElementById("reg-error");
        errorBox.innerHTML = "";
        const date = document.getElementById("reg-date").value;
        const notes = document.getElementById("reg-notes").value.trim();
        const slotEls = Array.from(document.querySelectorAll("#slots-container [data-slot]"));
        const slotData = slotEls.map((s) => ({
          playerId: s.querySelector(".slot-player-select").value,
          deckId: s.querySelector(".slot-deck-select").value,
          isWinner: s.querySelector(".slot-winner-radio").checked,
        }));

        function fail(msg) { 
          errorBox.innerHTML = `<div class="bg-crimson/10 border border-crimson text-parchment text-xs p-3 rounded-lg mb-4">Error: ${esc(msg)}</div>`; 
        }

        if (!date) return fail("Por favor, indica la fecha de la partida.");
        if (slotData.some((s) => !s.playerId || !s.deckId)) return fail("Cada puesto activo necesita un jugador y un mazo.");
        
        const ids = slotData.map((s) => s.playerId);
        if (new Set(ids).size !== ids.length) return fail("Un jugador no puede participar más de una vez en la misma partida.");
        
        const winner = slotData.find((s) => s.isWinner);
        if (!winner) return fail("Debe designarse un vencedor en el combate.");

        addGame(date, slotData.map((s) => ({ playerId: s.playerId, deckId: s.deckId })), winner.playerId, notes);
      });

      const log = document.getElementById("game-log");
      log.addEventListener("click", (e) => {
        const askBtn = e.target.closest('[data-action="delete-game-ask"]');
        if (askBtn) {
          const zone = askBtn.closest(".game-delete-zone");
          const gameId = askBtn.closest("[data-game-id]").getAttribute("data-game-id");
          zone.innerHTML = `
            <div class="flex items-center gap-1.5 bg-crimson/10 p-1 rounded border border-crimson/20">
              <button class="text-[10px] uppercase font-bold tracking-wider bg-crimson text-white rounded px-2 py-1 transition-colors cursor-pointer" data-action="delete-game-confirm">Borrar</button>
              <button class="text-[10px] uppercase font-bold tracking-wider bg-white/5 border border-white/10 text-parchment rounded px-2 py-1 transition-colors cursor-pointer" data-action="delete-game-cancel">Cancelar</button>
            </div>`;
          zone.setAttribute("data-game-id", gameId);
          return;
        }
        
        const confirmBtn = e.target.closest('[data-action="delete-game-confirm"]');
        if (confirmBtn) {
          const gameId = confirmBtn.closest("[data-game-id]").getAttribute("data-game-id");
          deleteGame(gameId);
          return;
        }
        
        const cancelBtn = e.target.closest('[data-action="delete-game-cancel"]');
        if (cancelBtn) {
          const zone = cancelBtn.closest(".game-delete-zone");
          zone.innerHTML = `
            <button class="text-xs text-crimson bg-crimson/5 hover:bg-crimson hover:text-white border border-crimson/30 rounded px-2.5 py-1 transition-colors cursor-pointer" data-action="delete-game-ask" title="Eliminar partida">
              Borrar Registro
            </button>`;
        }
      });
    }

    function rebuildDeckSelect(slotEl, playerId) {
      const { decks } = appState.data;
      const deckSelect = slotEl.querySelector(".slot-deck-select");
      const available = decks.filter((d) => d.playerId === playerId);
      if (!playerId) {
        deckSelect.innerHTML = `<option value="">Elige jugador</option>`;
        deckSelect.disabled = true;
        return;
      }
      deckSelect.disabled = false;
      deckSelect.innerHTML = `<option value="">${available.length ? "Selecciona..." : "Sin mazos creados"}</option>` +
        available.map((d) => `<option value="${d.id}">${esc(d.name)} — ${esc(d.commander)}</option>`).join("");
    }

    function refreshSlotControls() {
      const slots = document.querySelectorAll("#slots-container [data-slot]");
      slots.forEach((s) => {
        const removeBtn = s.querySelector('[data-action="remove-slot"]');
        removeBtn.style.visibility = slots.length > 2 ? "visible" : "hidden";
      });
      const addBtn = document.getElementById("add-slot-btn");
      if (addBtn) addBtn.disabled = slots.length >= 6;
    }

    function rankingTabHTML() {
      const rankingPlayers = computePlayerStats().sort((a, b) => b.winrate - a.winrate || b.wins - a.wins || b.gamesPlayed - a.gamesPlayed || a.name.localeCompare(b.name));
      const rankingDecks = getDecksRanking();

      const playerRows = rankingPlayers.map((p, i) => {
        const rankSymbol = i + 1;
        const coverPhoto = getPlayerBackground(p);
        return `
          <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
            <td class="py-3 px-2 font-serif font-bold text-center text-gold text-lg w-12">${rankSymbol}</td>
            <td class="py-3 px-2">
              <div class="flex items-center gap-3">
                <img src="${coverPhoto}" class="w-8 h-8 rounded-full object-cover border border-white/10 shrink-0">
                <span class="font-serif font-semibold text-parchment text-sm line-clamp-1">${esc(p.name)}</span>
              </div>
            </td>
            <td class="py-3 px-2 font-mono text-center text-xs text-parchmentDim/80">${p.gamesPlayed}</td>
            <td class="py-3 px-2 font-mono text-center text-xs text-goldBright">${p.wins}</td>
            <td class="py-3 px-2 font-mono text-right text-xs font-bold text-gold">${Math.round(p.winrate)}%</td>
          </tr>
        `;
      }).join("");

      const deckRows = rankingDecks.map((d, i) => {
        const rankSymbol = i + 1;
        const thumb = d.imageUrl || "https://placehold.co/100x100/1b241f/bb9550?text=Mazo";
        return `
          <tr class="border-b border-white/5 hover:bg-white/[0.02] transition-colors">
            <td class="py-3 px-2 font-serif font-bold text-center text-gold text-lg w-12">${rankSymbol}</td>
            <td class="py-3 px-2">
              <div class="flex items-center gap-3">
                <img src="${thumb}" class="w-8 h-8 rounded-full object-cover border border-white/10 shrink-0">
                <div class="min-w-0">
                  <div class="font-serif font-semibold text-parchment text-sm truncate" title="${esc(d.name)}">${esc(d.name)}</div>
                  <div class="text-[10px] text-parchmentDim/50 truncate">Comandante: ${esc(d.commander)} (por ${esc(d.ownerName)})</div>
                </div>
              </div>
            </td>
            <td class="py-3 px-2 font-mono text-center text-xs text-parchmentDim/80">${d.gamesPlayed}</td>
            <td class="py-3 px-2 font-mono text-center text-xs text-goldBright">${d.wins}</td>
            <td class="py-3 px-2 font-mono text-right text-xs font-bold text-gold">${Math.round(d.winrate)}%</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fade-in">
          <!-- Player Ranking Panel -->
          <div class="bg-black/20 border border-gold/10 p-5 sm:p-6 rounded-2xl shadow-xl">
            <div class="mb-4">
              <h2 class="font-serif text-2xl font-bold text-goldBright">Ranking de Jugadores</h2>
              <p class="text-parchmentDim/50 text-xs mt-1">Clasificados por porcentaje de victorias, victorias totales y partidas jugadas.</p>
            </div>
            ${rankingPlayers.length === 0 ? `
              <div class="text-center py-8 text-parchmentDim/40 italic text-sm">Sin datos de jugadores disponibles.</div>
            ` : `
              <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase tracking-wider text-parchmentDim/60 font-semibold">
                      <th class="py-2 text-center w-12">Pos</th>
                      <th class="py-2">Jugador</th>
                      <th class="py-2 text-center">PJ</th>
                      <th class="py-2 text-center">Wins</th>
                      <th class="py-2 text-right">Winrate</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${playerRows}
                  </tbody>
                </table>
              </div>
            `}
          </div>

          <!-- Decks Ranking Panel -->
          <div class="bg-black/20 border border-gold/10 p-5 sm:p-6 rounded-2xl shadow-xl">
            <div class="mb-4">
              <h2 class="font-serif text-2xl font-bold text-goldBright">Ranking de Barajas</h2>
              <p class="text-parchmentDim/50 text-xs mt-1">Clasificadas por porcentaje de victorias de cada mazo registrado.</p>
            </div>
            ${rankingDecks.length === 0 ? `
              <div class="text-center py-8 text-parchmentDim/40 italic text-sm">Sin datos de barajas disponibles.</div>
            ` : `
              <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                  <thead>
                    <tr class="border-b border-white/10 text-[10px] uppercase tracking-wider text-parchmentDim/60 font-semibold">
                      <th class="py-2 text-center w-12">Pos</th>
                      <th class="py-2">Mazo / Comandante</th>
                      <th class="py-2 text-center">PJ</th>
                      <th class="py-2 text-center">Wins</th>
                      <th class="py-2 text-right">Winrate</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${deckRows}
                  </tbody>
                </table>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function deckRowHTML(d, stats) {
      const st = stats[d.id] || { gamesPlayed: 0, wins: 0, winrate: 0 };
      const rowBg = d.imageUrl ? `background-image: linear-gradient(90deg, rgba(0,0,0,0.85) 30%, rgba(0,0,0,0.45) 100%), url('${d.imageUrl}'); background-size: cover; background-position: center;` : '';
      
      return `
        <div class="flex items-center justify-between gap-3 p-3 rounded-xl border border-white/5 transition-all duration-200 hover:border-gold/30" style="${rowBg}" data-deck-id="${d.id}">
          <div class="min-w-0">
            <div class="font-semibold text-parchment text-sm leading-tight truncate drop-shadow-md">${esc(d.name)}</div>
            <div class="text-[11px] text-goldBright/90 italic leading-none mt-1 truncate drop-shadow">Comandante: ${esc(d.commander)}</div>
            ${d.deckUrl ? `
              <a href="${esc(d.deckUrl)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-[10px] text-goldBright hover:underline mt-1.5 bg-black/50 px-1.5 py-0.5 rounded border border-gold/10">

              </a>` : `<span class="text-[9px] text-parchmentDim/40 italic block mt-1.5">Sin enlace</span>`

            <div class="text-right font-mono text-[9px] text-parchmentDim/60">
              <span class="block font-semibold text-goldBright text-[10px]">${st.wins}V - ${st.gamesPlayed}PJ</span>
              <span>WR: ${Math.round(st.winrate)}%</span>
            </div>
            <button class="text-crimson/70 hover:text-crimson bg-crimson/10 p-1.5 rounded text-xs transition-colors cursor-pointer font-semibold" data-action="delete-deck" title="Eliminar mazo">
              Borrar
            </button>
          </div>
        </div>`;
    }

    function playerCardHTML(p, decks, stats) {
      const playerDecks = decks.filter((d) => d.playerId === p.id);
      
      return `
        <div class="bg-black/25 border border-gold/10 rounded-2xl overflow-hidden shadow-xl flex flex-col justify-between" data-player-id="${p.id}">
          ${renderPlayerProfileCard(p, null, "border-none rounded-b-none h-[250px]")}

          <div class="p-5 bg-black/30 border-t border-white/5 space-y-4 flex-1 flex flex-col justify-between">
            <div class="player-delete-error"></div>

            <div class="space-y-3">
              <div class="flex items-center justify-between">
                <h4 class="text-xs uppercase tracking-widest text-parchmentDim/70 font-semibold">Arsenales y Mazos</h4>
                <span class="text-[11px] text-gold font-semibold bg-gold/10 px-2 py-0.5 rounded-full">${playerDecks.length} registrados</span>
              </div>
              <div class="space-y-2 max-h-[220px] overflow-y-auto pr-1" data-deck-list>
                ${playerDecks.length === 0 
                  ? `<div class="text-xs italic text-parchmentDim/40 py-4 text-center">Sin mazos registrados todavía.</div>` 
                  : playerDecks.map((d) => deckRowHTML(d, stats)).join("")}
              </div>
            </div>

            <div class="space-y-2 pt-2 border-t border-white/5">
              <div class="add-deck-zone">
                <button class="w-full text-center py-2 text-xs font-semibold rounded-lg bg-gold/10 border border-gold/20 text-goldBright hover:bg-gold hover:text-ink transition-all cursor-pointer" data-action="open-add-deck">
                  + Añadir Mazo
                </button>
              </div>
              <button class="w-full text-center py-2 text-xs font-semibold rounded-lg bg-white/5 border border-white/10 text-parchmentDim hover:bg-white/10 transition-all cursor-pointer" data-action="edit-profile">
                Editar Perfil
              </button>
              
              <div class="delete-player-zone text-center pt-1">
                <button class="text-[11px] text-crimson/50 hover:text-crimson hover:underline cursor-pointer" data-action="ask-delete-player">
                  Eliminar Jugador
                </button>
              </div>
            </div>

          </div>
        </div>`;
    }

    function jugadoresTabHTML() {
      const { decks } = appState.data;
      const stats = computeDeckStats();
      const players = computePlayerStats();
      const cards = players.map((p) => playerCardHTML(p, decks, stats)).join("");

      return `
        <div class="space-y-6">
          <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <h2 class="font-serif text-3xl font-extrabold text-goldBright tracking-wide">Comunidad de Jugadores</h2>
              <p class="text-parchmentDim/70 text-sm mt-1">Configura retratos, importa de Moxfield o Archidekt y administra tus arsenales.</p>
            </div>
            <div id="add-player-zone" class="shrink-0">
              <button class="px-5 py-2.5 rounded-xl bg-gold hover:bg-goldBright text-ink font-bold text-xs sm:text-sm tracking-wider transition-all shadow-lg cursor-pointer" data-action="open-add-player">
                + NUEVO JUGADOR
              </button>
            </div>
          </div>

          ${players.length === 0
            ? `<div class="text-center py-16 bg-black/25 border border-white/5 rounded-2xl text-parchmentDim/50 font-mono text-sm">No hay perfiles de jugadores creados en el grupo.</div>`
            : `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-fade-in" id="player-grid">${cards}</div>`}
        </div>`;
    }

    function addPlayerFormHTML(isEdit = false, player = null) {
      const nameVal = isEdit ? player.name : "";
      const avatarVal = isEdit ? player.avatarUrl : "";
      
      return `
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in">
          <div class="bg-felt border border-gold/40 rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="font-serif text-2xl font-bold text-goldBright mb-4">
              ${isEdit ? "Editar Perfil de Comandante" : "Crear Nuevo Jugador"}
            </h3>
            
            <form id="add-player-form" class="space-y-4">
              <div id="add-player-error"></div>
              
              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-parchmentDim/70 mb-1">Nombre</label>
                <input type="text" id="new-player-name" placeholder="Ej. Xesc el Temible" value="${esc(nameVal)}" class="w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-sm focus:border-gold focus:outline-none">
              </div>

              <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-parchmentDim/70 mb-1">Retrato de Fondo (Imagen)</label>
                <input type="url" id="new-player-avatar" placeholder="https://ejemplo.com/retrato.jpg" value="${esc(avatarVal)}" class="w-full bg-feltLight border border-gold/30 text-parchment rounded-lg p-2.5 text-xs focus:border-gold focus:outline-none mb-2">
                <span class="block text-[10px] text-parchmentDim/50 mb-3">Puedes pegar un enlace directo de internet o elegir una plantilla debajo:</span>
                
                <div class="grid grid-cols-4 gap-2 bg-black/30 p-2.5 rounded-lg border border-white/5">
                  ${PRESET_AVATARS.map((av, idx) => `
                    <button type="button" class="preset-avatar-btn relative rounded overflow-hidden aspect-[4/3] border border-white/10 hover:border-gold transition-all" data-url="${av.url}">
                      <img src="${av.url}" class="w-full h-full object-cover">
                      <div class="absolute bottom-0 inset-x-0 bg-black/60 text-[9px] text-center py-0.5 text-parchment truncate">${av.name}</div>
                    </button>
                  `).join("")}
                </div>
              </div>

              <div class="flex gap-2 pt-3">
                <button type="submit" class="flex-1 py-2.5 rounded-lg bg-gold text-ink font-bold text-sm hover:bg-goldBright transition-all cursor-pointer">
                  Guardar Cambios
                </button>
                <button type="button" class="px-5 py-2.5 rounded-lg bg-white/5 border border-white/10 text-parchment text-sm hover:bg-white/10 transition-all cursor-pointer" id="cancel-player-form">
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>`;
    }

    function addDeckFormHTML() {
      return `
        <form class="bg-black/40 border border-gold/20 p-4 rounded-xl space-y-3 animate-fade-in" data-add-deck-form>
          <div class="deck-form-error"></div>
          
          <div>
            <label class="block text-[9px] uppercase tracking-wider text-gold/80 mb-1 font-semibold">Nombre del mazo</label>
            <input type="text" class="new-deck-name w-full bg-felt border border-gold/30 text-parchment rounded p-2 text-xs focus:outline-none" placeholder="Ej. Elfos de Llanowar">
          </div>

          <div>
            <label class="block text-[9px] uppercase tracking-wider text-gold/80 mb-1 font-semibold flex justify-between">
              <span>Enlace de Decklist (Moxfield, Archidekt, etc.)</span>
              <span class="text-[8px] text-goldBright animate-pulse">Llenado automático activo</span>
            </label>
            <div class="relative flex gap-1.5">
              <input type="url" class="new-deck-url w-full bg-felt border border-gold/30 text-parchment rounded p-2 pr-20 text-xs focus:outline-none" placeholder="https://www.moxfield.com/decks/...">
              <button type="button" class="bg-gold/20 hover:bg-gold hover:text-black text-goldBright text-[10px] px-2.5 py-1.5 rounded border border-gold/20 transition-all font-semibold shrink-0 cursor-pointer" data-action="autofetch-deck">
                Escanear
              </button>
            </div>
          </div>

          <div class="deck-preview-zone min-h-[20px]">
            <span class="text-[9px] text-parchmentDim/50 italic">Pega tu enlace y haz clic en Escanear para identificar tu comandante y su ilustración.</span>
          </div>

          <div>
            <label class="block text-[9px] uppercase tracking-wider text-gold/80 mb-1 font-semibold">Comandante</label>
            <input type="text" class="new-deck-commander w-full bg-felt border border-gold/30 text-parchment rounded p-2 text-xs focus:outline-none" placeholder="Ej. Marwyn, la Nutricia">
          </div>

          <div class="flex gap-2 pt-1">
            <button type="submit" class="flex-1 py-1.5 rounded bg-gold text-ink font-bold text-xs hover:bg-goldBright cursor-pointer">Guardar Mazo</button>
            <button type="button" class="px-3 py-1.5 rounded bg-white/5 border border-white/10 text-parchment text-xs hover:bg-white/10 cursor-pointer" data-action="cancel-add-deck">Cancelar</button>
          </div>
        </form>
      `;
    }

    async function handleAutofetch(decklistUrl, zone) {
      const statusZone = zone.querySelector(".deck-preview-zone");
      const commanderInput = zone.querySelector(".new-deck-commander");
      
      if (!decklistUrl) {
        statusZone.innerHTML = `<span class="text-[10px] text-crimson">Por favor introduce un enlace válido primero.</span>`;
        return;
      }
      
      statusZone.innerHTML = `
        <div class="flex items-center gap-2 text-[10px] text-goldBright/80 py-1">
          <svg class="animate-spin h-3 w-3 text-goldBright" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="font-mono text-[9px]">Analizando estructura del mazo con IA...</span>
        </div>`;
        
      try {
        const commanderName = await fetchCommanderFromUrl(decklistUrl);
        if (commanderName) {
          statusZone.innerHTML = `
            <div class="flex items-center gap-2 text-[10px] text-goldBright/80 py-1">
              <svg class="animate-spin h-3 w-3 text-goldBright" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span class="font-mono text-[9px]">Encontrado: ${esc(commanderName)}. Extrayendo arte de Scryfall...</span>
            </div>`;
          
          const cardData = await fetchScryfallData(commanderName);
          if (cardData) {
            commanderInput.value = cardData.name;
            statusZone.innerHTML = `
              <div class="mt-2 p-2 bg-black/40 border border-gold/20 rounded-lg flex items-center gap-3 animate-fade-in">
                <img class="w-12 h-12 object-cover rounded border border-white/10 shrink-0 shadow-lg" src="${cardData.artCrop}">
                <div>
                  <div class="text-[9px] uppercase text-goldBright tracking-wider font-semibold">¡Importación Exitosa!</div>
                  <div class="text-xs font-bold text-parchment leading-tight">${cardData.name}</div>
                </div>
              </div>`;
            zone.setAttribute("data-temp-image-url", cardData.artCrop);
          } else {
            commanderInput.value = commanderName;
            statusZone.innerHTML = `<span class="text-[10px] text-goldBright font-medium">Comandante: <strong>${esc(commanderName)}</strong> (Ilustración no hallada).</span>`;
          }
        } else {
          statusZone.innerHTML = `<span class="text-[10px] text-crimson">No se detectó un comandante automáticamente. Escríbelo abajo.</span>`;
        }
      } catch (err) {
        console.error(err);
        statusZone.innerHTML = `<span class="text-[10px] text-crimson">La lectura falló. Escríbelo manualmente debajo.</span>`;
      }
    }

    function initJugadoresTab() {
      const addZone = document.getElementById("add-player-zone");
      const grid = document.getElementById("player-grid");

      addZone.addEventListener("click", (e) => {
        if (e.target.closest('[data-action="open-add-player"]')) {
          const modalWrapper = document.createElement("div");
          modalWrapper.id = "player-modal-container";
          modalWrapper.innerHTML = addPlayerFormHTML(false);
          document.body.appendChild(modalWrapper);

          modalWrapper.querySelectorAll(".preset-avatar-btn").forEach(btn => {
            btn.addEventListener("click", () => {
              modalWrapper.querySelector("#new-player-avatar").value = btn.getAttribute("data-url");
              modalWrapper.querySelectorAll(".preset-avatar-btn").forEach(b => b.classList.remove("border-gold"));
              btn.classList.add("border-gold");
            });
          });

          modalWrapper.querySelector("#add-player-form").addEventListener("submit", (ev) => {
            ev.preventDefault();
            const name = modalWrapper.querySelector("#new-player-name").value.trim();
            const avatar = modalWrapper.querySelector("#new-player-avatar").value.trim();
            const errBox = modalWrapper.querySelector("#add-player-error");
            if (!name) { 
              errBox.innerHTML = `<div class="bg-crimson/10 border border-crimson text-parchment text-xs p-3 rounded-lg mb-3">Ponle un nombre de batalla al jugador.</div>`; 
              return; 
            }
            addPlayer(name, avatar);
            modalWrapper.remove();
          });

          modalWrapper.querySelector("#cancel-player-form").addEventListener("click", () => {
            modalWrapper.remove();
          });
        }
      });

      if (!grid) return;

      grid.addEventListener("click", async (e) => {
        const card = e.target.closest("[data-player-id]");
        if (!card) return;
        const playerId = card.getAttribute("data-player-id");
        const playerObj = appState.data.players.find(p => p.id === playerId);

        if (e.target.closest('[data-action="edit-profile"]')) {
          const modalWrapper = document.createElement("div");
          modalWrapper.id = "player-modal-container";
          modalWrapper.innerHTML = addPlayerFormHTML(true, playerObj);
          document.body.appendChild(modalWrapper);

          modalWrapper.querySelectorAll(".preset-avatar-btn").forEach(btn => {
            btn.addEventListener("click", () => {
              modalWrapper.querySelector("#new-player-avatar").value = btn.getAttribute("data-url");
              modalWrapper.querySelectorAll(".preset-avatar-btn").forEach(b => b.classList.remove("border-gold"));
              btn.classList.add("border-gold");
            });
          });

          modalWrapper.querySelector("#add-player-form").addEventListener("submit", (ev) => {
            ev.preventDefault();
            const name = modalWrapper.querySelector("#new-player-name").value.trim();
            const avatar = modalWrapper.querySelector("#new-player-avatar").value.trim();
            const errBox = modalWrapper.querySelector("#add-player-error");
            if (!name) { 
              errBox.innerHTML = `<div class="bg-crimson/10 border border-crimson text-parchment text-xs p-3 rounded-lg mb-3">El nombre no puede estar vacío.</div>`; 
              return; 
            }
            updatePlayer(playerId, name, avatar);
            modalWrapper.remove();
          });

          modalWrapper.querySelector("#cancel-player-form").addEventListener("click", () => {
            modalWrapper.remove();
          });
          return;
        }

        if (e.target.closest('[data-action="open-add-deck"]')) {
          const zone = card.querySelector(".add-deck-zone");
          zone.innerHTML = addDeckFormHTML();
          
          const urlInput = zone.querySelector(".new-deck-url");
          const autoBtn = zone.querySelector('[data-action="autofetch-deck"]');
          const commanderInput = zone.querySelector(".new-deck-commander");
          
          const triggerAutofetch = () => {
            const url = urlInput.value.trim();
            if (url) {
              handleAutofetch(url, zone);
            }
          };

          autoBtn.addEventListener("click", triggerAutofetch);
          
          urlInput.addEventListener("blur", () => {
            if (!commanderInput.value.trim()) {
              triggerAutofetch();
            }
          });

          commanderInput.addEventListener("blur", async () => {
            const val = commanderInput.value.trim();
            if (val) {
              const previewZone = zone.querySelector(".deck-preview-zone");
              if (zone.getAttribute("data-temp-commander-name") === val) return;
              
              previewZone.innerHTML = `<span class="text-[10px] text-goldBright/70 animate-pulse">Buscando ilustración en Scryfall...</span>`;
              const cardData = await fetchScryfallData(val);
              if (cardData) {
                previewZone.innerHTML = `
                  <div class="mt-2 p-2 bg-black/40 border border-gold/20 rounded-lg flex items-center gap-3">
                    <img class="w-12 h-12 object-cover rounded border border-white/10 shrink-0" src="${cardData.artCrop}">
                    <div>
                      <div class="text-[9px] uppercase text-goldBright tracking-wider font-semibold">Ilustración Encontrada</div>
                      <div class="text-xs font-bold text-parchment leading-tight">${cardData.name}</div>
                    </div>
                  </div>`;
                zone.setAttribute("data-temp-image-url", cardData.artCrop);
                zone.setAttribute("data-temp-commander-name", cardData.name);
                commanderInput.value = cardData.name;
              } else {
                previewZone.innerHTML = `<span class="text-[10px] text-crimson">No se encontró en Scryfall. Puedes usar este nombre igualmente.</span>`;
              }
            }
          });

          zone.querySelector("[data-add-deck-form]").addEventListener("submit", (ev) => {
            ev.preventDefault();
            const name = zone.querySelector(".new-deck-name").value.trim();
            const commander = zone.querySelector(".new-deck-commander").value.trim();
            const url = zone.querySelector(".new-deck-url").value.trim();
            const imageUrl = zone.getAttribute("data-temp-image-url") || "";
            const errBox = zone.querySelector(".deck-form-error");
            
            if (!name || !commander) { 
              errBox.innerHTML = `<div class="bg-crimson/10 border border-crimson text-parchment text-[10px] p-2 rounded mb-2">Escribe nombre de mazo y comandante.</div>`; 
              return; 
            }
            addDeck(playerId, name, commander, url, imageUrl);
          });
          
          zone.querySelector('[data-action="cancel-add-deck"]').addEventListener("click", () => {
            zone.innerHTML = `<button class="text-center py-2 text-xs font-semibold rounded-lg bg-gold/10 border border-gold/20 text-goldBright hover:bg-gold hover:text-ink transition-all w-full cursor-pointer" data-action="open-add-deck">+ Añadir Mazo</button>`;
          });
          return;
        }

        if (e.target.closest('[data-action="delete-deck"]')) {
          const row = e.target.closest("[data-deck-id]");
          const deckId = row.getAttribute("data-deck-id");
          const ok = deleteDeck(deckId);
          if (!ok) {
            card.querySelector(".player-delete-error").innerHTML =
              `<div class="bg-crimson/10 border border-crimson text-parchment text-[10px] p-2.5 rounded-lg mb-3">No se puede eliminar un mazo que ya posee partidas registradas.</div>`;
          }
          return;
        }

        if (e.target.closest('[data-action="ask-delete-player"]')) {
          const zone = card.querySelector(".delete-player-zone");
          zone.innerHTML = `
            <div class="flex flex-col gap-1.5 p-2 bg-crimson/10 border border-crimson/25 rounded-lg">
              <span class="text-[10px] text-parchmentDim text-center font-semibold">¿Seguro de borrar jugador? Se perderán sus mazos creados.</span>
              <div class="flex gap-2">
                <button class="flex-1 text-[10px] uppercase font-bold tracking-wider bg-crimson text-white rounded py-1 cursor-pointer" data-action="confirm-delete-player">Sí, borrar</button>
                <button class="flex-1 text-[10px] uppercase font-bold tracking-wider bg-white/5 border border-white/10 text-parchment rounded py-1 cursor-pointer" data-action="cancel-delete-player">Cancelar</button>
              </div>
            </div>`;
          return;
        }
        
        if (e.target.closest('[data-action="cancel-delete-player"]')) {
          const zone = card.querySelector(".delete-player-zone");
          zone.innerHTML = `<button class="text-[11px] text-crimson/50 hover:text-crimson hover:underline cursor-pointer" data-action="ask-delete-player">Eliminar Jugador</button>`;
          return;
        }
        
        if (e.target.closest('[data-action="confirm-delete-player"]')) {
          const ok = deletePlayer(playerId);
          if (!ok) {
            card.querySelector(".player-delete-error").innerHTML =
              `<div class="bg-crimson/10 border border-crimson text-parchment text-[10px] p-2.5 rounded-lg mb-3">No se puede eliminar a este jugador porque tiene batallas en el historial.</div>`;
            const zone = card.querySelector(".delete-player-zone");
            zone.innerHTML = `<button class="text-[11px] text-crimson/50 hover:text-crimson hover:underline cursor-pointer" data-action="ask-delete-player">Eliminar Jugador</button>`;
          }
          return;
        }
      });
    }

    loadData();
  </script>
</body>
</html>
